<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bus Tracker SG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --card:    #1c2230;
    --border:  #21283a;
    --text:    #e6edf3;
    --muted:   #4a5568;
    --dim:     #2d3748;
    --mono:    'IBM Plex Mono', monospace;
    --head:    'IBM Plex Sans', sans-serif;

    /* Stop accent colours */
    --c-home:  #38bdf8;
    --c-ctps:  #f59e0b;
    --c-jj:    #fb923c;
    --c-san:   #4ade80;

    /* Bus colours */
    --c97:     #60a5fa;
    --c97e:    #a78bfa;
    --c197:    #f472b6;
    --c963:    #34d399;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  .header {
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .wordmark {
    font-family: var(--head);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1;
  }

  .wordmark .dot { color: var(--c-home); }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .refresh-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--bg);
    background: var(--c-home);
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s;
  }

  .refresh-btn:active { opacity: 0.75; transform: scale(0.97); }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

  .ts { font-size: 9px; color: var(--muted); letter-spacing: 0.5px; }

  /* ── COUNTDOWN ── */
  .countdown-bar {
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
    overflow: hidden;
  }

  .countdown-fill {
    height: 100%;
    background: var(--c-home);
    width: 100%;
    transition: width 1s linear;
    opacity: 0.6;
  }

  /* ── ERROR ── */
  .error-msg {
    font-family: var(--mono);
    font-size: 10px;
    color: #f87171;
    text-align: center;
    padding: 6px 12px;
    background: #450a0a;
    border: 1px solid #991b1b;
    border-radius: 8px;
    margin: 6px 14px 0;
    display: none;
    flex-shrink: 0;
  }

  .error-msg.visible { display: block; }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 12px 6px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── STOP HEADING ── */
  .stop-heading {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .stop-icon { font-size: 26px; line-height: 1; }

  .stop-name {
    font-family: var(--head);
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
  }

  .stop-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 3px;
  }

  .stop-code { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

  .stop-dist {
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 500;
    display: none;
  }

  .stop-dist.visible { display: inline-block; }

  /* ── BUS LIST ── */
  .bus-list { display: flex; flex-direction: column; gap: 7px; }

  .bus-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 10px 8px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .bus-97   { border-left: 3px solid var(--c97); }
  .bus-97e  { border-left: 3px solid var(--c97e); }
  .bus-197  { border-left: 3px solid var(--c197); }
  .bus-963  { border-left: 3px solid var(--c963); }

  .bus-num-col {
    width: 42px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .bus-number {
    font-family: var(--head);
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }

  .bus-97   .bus-number { color: var(--c97); }
  .bus-97e  .bus-number { color: var(--c97e); }
  .bus-197  .bus-number { color: var(--c197); }
  .bus-963  .bus-number { color: var(--c963); }

  /* ── 3 CHIPS ── */
  .arrivals {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    flex: 1;
  }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 3px 5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .chip-time {
    font-family: var(--mono);
    font-size: 17px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.3px;
    color: #475569;
  }

  .chip-time.t-green { color: #4ade80; }
  .chip-time.t-amber { color: #fbbf24; }
  .chip-time.t-blue  { color: var(--c-home); }

  .chip-badges {
    display: flex;
    gap: 3px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .badge {
    font-size: 8px;
    font-weight: 500;
    padding: 2px 4px;
    border-radius: 3px;
    letter-spacing: 0.2px;
    white-space: nowrap;
    font-family: var(--mono);
  }

  .b-SEA { background: #052e16; color: #4ade80; border: 1px solid #166534; }
  .b-SDA { background: #451a03; color: #fbbf24; border: 1px solid #92400e; }
  .b-LSD { background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
  .b-NA  { background: var(--dim); color: var(--muted); border: 1px solid var(--border); }
  .b-SD  { background: #0c1a2e; color: #60a5fa; border: 1px solid #1e3a5f; }
  .b-DD  { background: #2d1200; color: #fb923c; border: 1px solid #7c2d12; }
  .b-BD  { background: #052e16; color: #86efac; border: 1px solid #14532d; }

  /* ── SKELETON ── */
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position:  200% 0; }
  }

  .skel {
    border-radius: 4px;
    background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
  }

  /* ── LEGEND ── */
  .legend {
    padding: 7px 12px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    justify-content: center;
    flex-shrink: 0;
  }

  .li { display: flex; align-items: center; gap: 4px; font-size: 9px; color: var(--muted); }
  .ld { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .ld.sea { background: #4ade80; }
  .ld.sda { background: #fbbf24; }
  .ld.lsd { background: #f87171; }
  .lb { width: 14px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .lb.sd { background: #0c1a2e; border: 1px solid #1e3a5f; }
  .lb.dd { background: #2d1200; border: 1px solid #7c2d12; }
  .lb.bd { background: #052e16; border: 1px solid #14532d; }

  /* ── BOTTOM NAV — 4 tabs ── */
  .bottom-nav {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 0 2px;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 8px 2px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    position: relative;
    transition: all 0.15s;
    min-width: 0;
  }

  .nav-btn:active { transform: scale(0.93); }

  /* Coloured indicator dot above icon */
  .nav-btn::before {
    content: '';
    position: absolute;
    top: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 3px;
    border-radius: 2px;
    transition: width 0.2s;
  }

  .nav-icon { font-size: 20px; line-height: 1; }

  .nav-label {
    font-family: var(--head);
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 72px;
    text-align: center;
  }

  .nav-dist {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    min-height: 11px;
  }

  /* Active states per stop */
  .nav-btn.act-home::before  { width: 20px; background: var(--c-home); }
  .nav-btn.act-ctps::before  { width: 20px; background: var(--c-ctps); }
  .nav-btn.act-jj::before    { width: 20px; background: var(--c-jj); }
  .nav-btn.act-san::before   { width: 20px; background: var(--c-san); }

  .nav-btn.act-home .nav-label { color: var(--c-home); }
  .nav-btn.act-ctps .nav-label { color: var(--c-ctps); }
  .nav-btn.act-jj   .nav-label { color: var(--c-jj); }
  .nav-btn.act-san  .nav-label { color: var(--c-san); }

  .nav-btn.act-home .nav-dist { color: var(--c-home); opacity: 0.7; }
  .nav-btn.act-ctps .nav-dist { color: var(--c-ctps); opacity: 0.7; }
  .nav-btn.act-jj   .nav-dist { color: var(--c-jj);   opacity: 0.7; }
  .nav-btn.act-san  .nav-dist { color: var(--c-san);  opacity: 0.7; }

  /* Stop name colours in content heading */
  .sn-home { color: var(--c-home); }
  .sn-ctps { color: var(--c-ctps); }
  .sn-jj   { color: var(--c-jj); }
  .sn-san  { color: var(--c-san); }

  /* Stop dist pill colours */
  .sd-home { background: #0c2233; color: var(--c-home); }
  .sd-ctps { background: #2d1f00; color: var(--c-ctps); }
  .sd-jj   { background: #2d1200; color: var(--c-jj); }
  .sd-san  { background: #052e16; color: var(--c-san); }
</style>
</head>
<body>

<div class="header">
  <div class="wordmark">BUS<span class="dot">.</span>SG</div>
  <div class="header-right">
    <button class="refresh-btn" id="refreshBtn" onclick="fetchAll()">⟳ REFRESH</button>
    <div class="ts" id="ts">—</div>
  </div>
</div>

<div class="countdown-bar"><div class="countdown-fill" id="cdFill"></div></div>
<div class="error-msg" id="errMsg"></div>

<div class="main" id="mainContent"></div>

<div class="legend">
  <div class="li"><div class="ld sea"></div>SEA Seats</div>
  <div class="li"><div class="ld sda"></div>SDA Standing</div>
  <div class="li"><div class="ld lsd"></div>LSD Limited</div>
  <div class="li"><div class="lb sd"></div>SD Single</div>
  <div class="li"><div class="lb dd"></div>DD Double</div>
  <div class="li"><div class="lb bd"></div>BD Bendy</div>
</div>

<div class="bottom-nav" id="bottomNav">
  <button class="nav-btn" id="nav-home" onclick="switchTab('home')">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Home</span>
    <span class="nav-dist" id="dist-home"></span>
  </button>
  <button class="nav-btn" id="nav-ctps" onclick="switchTab('ctps')">
    <span class="nav-icon">🏫</span>
    <span class="nav-label">CTPS</span>
    <span class="nav-dist" id="dist-ctps"></span>
  </button>
  <button class="nav-btn" id="nav-jj" onclick="switchTab('jj')">
    <span class="nav-icon">🏢</span>
    <span class="nav-label">JJ Office</span>
    <span class="nav-dist" id="dist-jj"></span>
  </button>
  <button class="nav-btn" id="nav-san" onclick="switchTab('san')">
    <span class="nav-icon">🏗️</span>
    <span class="nav-label">San Office</span>
    <span class="nav-dist" id="dist-san"></span>
  </button>
</div>

<script>
  // ── Stop config ──────────────────────────────────────────
  const STOPS = {
    home: { code: 'B17149', ltaCode: '17149', name: 'Home',       icon: '🏠', cls: 'home' },
    ctps: { code: 'B20019', ltaCode: '20019', name: 'CTPS',       icon: '🏫', cls: 'ctps' },
    jj:   { code: 'B18101', ltaCode: '18101', name: 'JJ Office',  icon: '🏢', cls: 'jj'   },
    san:  { code: 'B18131', ltaCode: '18131', name: 'San Office', icon: '🏗️', cls: 'san'  }
  };

  const BUS_CLASS        = { '97':'bus-97', '97E':'bus-97e', '197':'bus-197', '963':'bus-963' };
  const BUSES            = ['97', '97E', '197', '963'];
  const AUTO_REFRESH_SEC = 30;

  let activeTab      = 'home';
  let countdownSecs  = AUTO_REFRESH_SEC;
  let countdownTimer = null;
  let cachedServices = {};

  // ── 97E per-stop peak rules ──────────────────────────────
  // AM (07:00–08:30): outbound Tengah→City — B17149 (Home) & B20019 (CTPS)
  // PM (18:00–19:10): inbound City→Tengah  — B18101 (JJ) & B18131 (San)
  function is97EActiveForStop(stopCode) {
    const now    = new Date();
    const sgtMin = (now.getUTCHours() * 60 + now.getUTCMinutes() + 480) % 1440;
    const sgtDow = (now.getUTCDay() + (now.getUTCHours() + 8 >= 24 ? 1 : 0)) % 7;
    if (sgtDow < 1 || sgtDow > 5) return false;
    const am = sgtMin >= 420  && sgtMin <= 510;
    const pm = sgtMin >= 1080 && sgtMin <= 1150;
    if (stopCode === 'B17149' || stopCode === 'B20019') return am || pm;
    if (stopCode === 'B18101' || stopCode === 'B18131') return pm;
    return false;
  }

  function activeBusesForStop(stopCode) {
    return is97EActiveForStop(stopCode) ? BUSES : BUSES.filter(b => b !== '97E');
  }

  // ── Arrival helpers ──────────────────────────────────────
  function arrivalLabel(isoStr) {
    if (!isoStr || isoStr === '0001-01-01T00:00:00+08:00') return null;
    const diff = Math.round((new Date(isoStr) - Date.now()) / 60000);
    if (diff <= 0) return { text: 'Arr', cls: 't-blue' };
    if (diff <= 3) return { text: diff + 'm', cls: 't-amber' };
    return { text: diff + 'm', cls: 't-green' };
  }

  function loadBadge(l) {
    const m = { SEA:['SEA','b-SEA'], SDA:['SDA','b-SDA'], LSD:['LSD','b-LSD'] };
    const [t, c] = m[l] || ['–','b-NA'];
    return `<span class="badge ${c}">${t}</span>`;
  }

  function typeBadge(t) {
    const m = { SD:['SD','b-SD'], DD:['DD','b-DD'], BD:['BD','b-BD'] };
    const [tx, c] = m[t] || ['–','b-NA'];
    return `<span class="badge ${c}">${tx}</span>`;
  }

  // ── Render ───────────────────────────────────────────────
  function buildBusRows(stop, services) {
    return activeBusesForStop(stop.code).map(busNo => {
      const svc = services.find(s => s.ServiceNo === busNo);
      const bc  = BUS_CLASS[busNo] || '';
      let chips = '';

      if (!svc) {
        chips = [1,2,3].map(() => `
          <div class="chip">
            <span class="chip-time">–</span>
            <div class="chip-badges">${loadBadge(null)}${typeBadge(null)}</div>
          </div>`).join('');
      } else {
        const ft = svc.NextBus?.Type || svc.NextBus2?.Type || '';
        chips = [svc.NextBus, svc.NextBus2, svc.NextBus3].map(b => {
          const lbl = arrivalLabel(b?.EstimatedArrival);
          const t   = b?.Type || ft;
          if (!lbl) return `
            <div class="chip">
              <span class="chip-time">–</span>
              <div class="chip-badges">${loadBadge(null)}${typeBadge(t)}</div>
            </div>`;
          return `
            <div class="chip">
              <span class="chip-time ${lbl.cls}">${lbl.text}</span>
              <div class="chip-badges">${loadBadge(b?.Load)}${typeBadge(t)}</div>
            </div>`;
        }).join('');
      }

      return `<div class="bus-row ${bc}">
        <div class="bus-num-col"><span class="bus-number">${busNo}</span></div>
        <div class="arrivals">${chips}</div>
      </div>`;
    }).join('');
  }

  function buildHeading(tabKey, stop) {
    const navDist = document.getElementById('dist-' + tabKey)?.textContent || '';
    const distHtml = navDist
      ? `<span class="stop-dist sd-${stop.cls} visible">${navDist}</span>`
      : `<span class="stop-dist sd-${stop.cls}" id="content-dist-${tabKey}"></span>`;
    return `
      <div class="stop-heading">
        <span class="stop-icon">${stop.icon}</span>
        <div>
          <div class="stop-name sn-${stop.cls}">${stop.name}</div>
          <div class="stop-meta">
            <span class="stop-code">${stop.code}</span>
            ${distHtml}
          </div>
        </div>
      </div>`;
  }

  function renderContent(tabKey) {
    const stop     = STOPS[tabKey];
    const services = cachedServices[stop.code] || [];
    document.getElementById('mainContent').innerHTML =
      buildHeading(tabKey, stop) +
      `<div class="bus-list">${buildBusRows(stop, services)}</div>`;
  }

  function renderSkeleton(tabKey) {
    const stop = STOPS[tabKey];
    const skelRow = () => `
      <div class="bus-row">
        <div class="bus-num-col"><div class="skel" style="width:34px;height:26px;border-radius:5px"></div></div>
        <div class="arrivals">
          ${[1,2,3].map(() => `
            <div class="chip">
              <div class="skel" style="width:65%;height:18px;margin-bottom:4px;border-radius:3px"></div>
              <div class="skel" style="width:85%;height:11px;border-radius:3px"></div>
            </div>`).join('')}
        </div>
      </div>`;
    document.getElementById('mainContent').innerHTML =
      buildHeading(tabKey, stop) +
      `<div class="bus-list">${activeBusesForStop(stop.code).map(skelRow).join('')}</div>`;
  }

  // ── Tab switching ────────────────────────────────────────
  function switchTab(tabKey) {
    activeTab = tabKey;
    document.querySelectorAll('.nav-btn').forEach(b =>
      b.classList.remove('act-home','act-ctps','act-jj','act-san'));
    document.getElementById('nav-' + tabKey).classList.add('act-' + STOPS[tabKey].cls);
    cachedServices[STOPS[tabKey].code]
      ? renderContent(tabKey)
      : renderSkeleton(tabKey);
    document.getElementById('mainContent').scrollTop = 0;
  }

  // ── Fetch ────────────────────────────────────────────────
  async function fetchStop(key) {
    const res = await fetch('/api/bus?stop=' + STOPS[key].code);
    if (!res.ok) throw new Error(`HTTP ${res.status} for ${STOPS[key].code}`);
    return (await res.json()).Services || [];
  }

  async function fetchAll() {
    const btn = document.getElementById('refreshBtn');
    const err = document.getElementById('errMsg');
    btn.classList.add('loading'); btn.textContent = '⟳ …';
    err.classList.remove('visible');
    renderSkeleton(activeTab);

    try {
      const keys    = Object.keys(STOPS);
      const results = await Promise.all(keys.map(fetchStop));
      keys.forEach((k, i) => { cachedServices[STOPS[k].code] = results[i]; });
      renderContent(activeTab);
      document.getElementById('ts').textContent =
        new Date().toLocaleTimeString('en-SG',
          { hour:'2-digit', minute:'2-digit', second:'2-digit' });
      resetCountdown();
    } catch (e) {
      err.textContent = '⚠ ' + e.message;
      err.classList.add('visible');
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = '⟳ REFRESH';
    }
  }

  // ── Countdown ────────────────────────────────────────────
  function resetCountdown() {
    clearInterval(countdownTimer);
    countdownSecs = AUTO_REFRESH_SEC;
    updateBar();
    countdownTimer = setInterval(() => {
      countdownSecs--;
      updateBar();
      if (countdownSecs <= 0) fetchAll();
    }, 1000);
  }

  function updateBar() {
    document.getElementById('cdFill').style.width =
      (countdownSecs / AUTO_REFRESH_SEC * 100) + '%';
  }

  // ── Geolocation ordering ─────────────────────────────────
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000, r = d => d * Math.PI / 180;
    const dLat = r(lat2-lat1), dLon = r(lon2-lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  async function fetchStopCoord(key) {
    try {
      const res = await fetch('/api/stops?code=' + STOPS[key].ltaCode);
      if (!res.ok) return null;
      const d = await res.json();
      return { lat: d.Latitude, lng: d.Longitude };
    } catch { return null; }
  }

  function applyOrder(orderedKeys) {
    const nav = document.getElementById('bottomNav');
    orderedKeys.forEach(k => nav.appendChild(document.getElementById('nav-' + k)));
    switchTab(orderedKeys[0]);
  }

  function orderByTime() {
    const sgtHour = (new Date().getUTCHours() + 8) % 24;
    applyOrder(sgtHour < 14
      ? ['home','ctps','jj','san']
      : ['jj','san','home','ctps']);
  }

  async function initOrder() {
    if (!navigator.geolocation) { orderByTime(); return; }
    const keys   = Object.keys(STOPS);
    const coords = await Promise.all(keys.map(fetchStopCoord));
    const sc = {};
    keys.forEach((k, i) => { if (coords[i]) sc[k] = coords[i]; });
    if (Object.keys(sc).length < 4) { orderByTime(); return; }

    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: uLat, longitude: uLng } = pos.coords;
        const sorted = keys
          .map(k => ({ key: k, dist: haversine(uLat, uLng, sc[k].lat, sc[k].lng) }))
          .sort((a, b) => a.dist - b.dist);

        sorted.forEach(({ key, dist }) => {
          const m = Math.round(dist);
          document.getElementById('dist-' + key).textContent =
            m < 1000 ? `${m}m` : `${(dist/1000).toFixed(1)}km`;
        });

        applyOrder(sorted.map(s => s.key));
        renderContent(activeTab);
      },
      () => orderByTime()
    );
  }

  // ── Init ─────────────────────────────────────────────────
  switchTab('home');
  initOrder();
  fetchAll();
</script>
</body>
</html>
