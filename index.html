<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bus Tracker SG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --card:    #1c2230;
    --border:  #21283a;
    --accent-home:   #38bdf8;
    --accent-jj:     #fb923c;
    --accent-san:    #4ade80;
    --text:    #e6edf3;
    --muted:   #4a5568;
    --dim:     #2d3748;
    --mono:    'DM Mono', monospace;
    --head:    'Syne', sans-serif;

    /* Bus colours */
    --c97:     #60a5fa;
    --c97e:    #a78bfa;
    --c197:    #f472b6;
    --c963:    #34d399;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── HEADER ── */
  .header {
    padding: 14px 18px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .wordmark {
    font-family: var(--head);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }

  .wordmark .dot { color: var(--accent-home); }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .refresh-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--bg);
    background: var(--accent-home);
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s;
  }

  .refresh-btn:active { opacity: 0.75; transform: scale(0.97); }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

  .ts {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* ── COUNTDOWN ── */
  .countdown-bar {
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
    overflow: hidden;
  }

  .countdown-fill {
    height: 100%;
    background: var(--accent-home);
    width: 100%;
    transition: width 1s linear;
    opacity: 0.6;
  }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 14px 14px 8px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── STOP HEADING ── */
  .stop-heading {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .stop-icon { font-size: 28px; line-height: 1; }

  .stop-name {
    font-family: var(--head);
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.3px;
    line-height: 1;
  }

  .stop-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 3px;
  }

  .stop-code {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .stop-dist {
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 500;
    display: none;
  }

  .stop-dist.visible { display: inline-block; }

  /* ── BUS ROWS ── */
  .bus-list { display: flex; flex-direction: column; gap: 8px; }

  .bus-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 12px 10px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    transition: border-color 0.2s;
  }

  /* Coloured left border per bus */
  .bus-97   { border-left: 3px solid var(--c97); }
  .bus-97e  { border-left: 3px solid var(--c97e); }
  .bus-197  { border-left: 3px solid var(--c197); }
  .bus-963  { border-left: 3px solid var(--c963); }

  .bus-num-col {
    width: 44px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding-top: 2px;
  }

  .bus-number {
    font-family: var(--head);
    font-size: 24px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.5px;
  }

  .bus-97   .bus-number { color: var(--c97); }
  .bus-97e  .bus-number { color: var(--c97e); }
  .bus-197  .bus-number { color: var(--c197); }
  .bus-963  .bus-number { color: var(--c963); }

  /* ── 3 CHIPS ── */
  .arrivals {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    flex: 1;
  }

  .chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 4px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .chip-time {
    font-family: var(--head);
    font-size: 20px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.5px;
    color: #94a3b8;
  }

  .chip-time.active-green { color: #4ade80; }
  .chip-time.active-amber { color: #fbbf24; }
  .chip-time.active-blue  { color: var(--accent-home); }

  .chip-badges {
    display: flex;
    gap: 3px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .badge {
    font-size: 8px;
    font-weight: 500;
    padding: 2px 4px;
    border-radius: 4px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  /* Load badges */
  .b-SEA { background: #052e16; color: #4ade80; border: 1px solid #166534; }
  .b-SDA { background: #451a03; color: #fbbf24; border: 1px solid #92400e; }
  .b-LSD { background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
  .b-NA  { background: var(--dim); color: var(--muted); border: 1px solid var(--border); }

  /* Type badges */
  .b-SD { background: #0c1a2e; color: #60a5fa; border: 1px solid #1e3a5f; }
  .b-DD { background: #2d1200; color: #fb923c; border: 1px solid #7c2d12; }
  .b-BD { background: #052e16; color: #86efac; border: 1px solid #14532d; }

  /* ── SKELETON ── */
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .skel {
    border-radius: 4px;
    background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
  }

  /* ── ERROR ── */
  .error-msg {
    font-size: 10px;
    color: #f87171;
    background: #450a0a;
    border: 1px solid #991b1b;
    border-radius: 8px;
    padding: 8px 14px;
    margin: 0 14px 8px;
    display: none;
    flex-shrink: 0;
  }

  .error-msg.visible { display: block; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 0 6px;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 6px 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all 0.15s;
    position: relative;
  }

  .nav-btn:active { transform: scale(0.94); }

  .nav-icon { font-size: 24px; line-height: 1; }

  .nav-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px;
    text-align: center;
  }

  .nav-dist {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.2px;
  }

  /* Active indicator — coloured dot above icon */
  .nav-btn::before {
    content: '';
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 3px;
    border-radius: 2px;
    transition: width 0.2s;
  }

  .nav-btn.active-home::before  { width: 24px; background: var(--accent-home); }
  .nav-btn.active-jj::before    { width: 24px; background: var(--accent-jj); }
  .nav-btn.active-san::before   { width: 24px; background: var(--accent-san); }

  .nav-btn.active-home  .nav-label { color: var(--accent-home); }
  .nav-btn.active-jj    .nav-label { color: var(--accent-jj); }
  .nav-btn.active-san   .nav-label { color: var(--accent-san); }

  .nav-btn.active-home  .nav-dist  { color: var(--accent-home); opacity: 0.7; }
  .nav-btn.active-jj    .nav-dist  { color: var(--accent-jj); opacity: 0.7; }
  .nav-btn.active-san   .nav-dist  { color: var(--accent-san); opacity: 0.7; }

  /* ── LEGEND ── */
  .legend {
    padding: 8px 14px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 4px 10px;
    justify-content: center;
    flex-shrink: 0;
  }

  .li {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .ld { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ld.sea { background: #4ade80; }
  .ld.sda { background: #fbbf24; }
  .ld.lsd { background: #f87171; }
  .lb { width: 14px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .lb.sd { background: #0c1a2e; border: 1px solid #1e3a5f; }
  .lb.dd { background: #2d1200; border: 1px solid #7c2d12; }
  .lb.bd { background: #052e16; border: 1px solid #14532d; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="wordmark">BUS<span class="dot">.</span>SG</div>
  <div class="header-right">
    <button class="refresh-btn" id="refreshBtn" onclick="fetchAll()">⟳ REFRESH</button>
    <div class="ts" id="ts">—</div>
  </div>
</div>

<!-- Countdown -->
<div class="countdown-bar"><div class="countdown-fill" id="cdFill"></div></div>

<!-- Error -->
<div class="error-msg" id="errMsg"></div>

<!-- Main scrollable content -->
<div class="main" id="mainContent">
  <!-- injected by JS -->
</div>

<!-- Legend -->
<div class="legend">
  <div class="li"><div class="ld sea"></div>SEA Seats</div>
  <div class="li"><div class="ld sda"></div>SDA Standing</div>
  <div class="li"><div class="ld lsd"></div>LSD Limited</div>
  <div class="li"><div class="lb sd"></div>SD Single</div>
  <div class="li"><div class="lb dd"></div>DD Double</div>
  <div class="li"><div class="lb bd"></div>BD Bendy</div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav" id="bottomNav">
  <button class="nav-btn" id="nav-home" onclick="switchTab('home')">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Home</span>
    <span class="nav-dist" id="dist-home"></span>
  </button>
  <button class="nav-btn" id="nav-jj" onclick="switchTab('jj')">
    <span class="nav-icon">🏢</span>
    <span class="nav-label">JJ Office</span>
    <span class="nav-dist" id="dist-jj"></span>
  </button>
  <button class="nav-btn" id="nav-san" onclick="switchTab('san')">
    <span class="nav-icon">🏗️</span>
    <span class="nav-label">San Office</span>
    <span class="nav-dist" id="dist-san"></span>
  </button>
</div>

<script>
  // ── Config ───────────────────────────────────────────────
  const STOPS = {
    home: { code: 'B20019', ltaCode: '20019', name: 'Home',       icon: '🏠', accent: 'var(--accent-home)' },
    jj:   { code: 'B18101', ltaCode: '18101', name: 'JJ Office',  icon: '🏢', accent: 'var(--accent-jj)' },
    san:  { code: 'B18131', ltaCode: '18131', name: 'San Office', icon: '🏗️', accent: 'var(--accent-san)' }
  };

  const BUS_CLASS = { '97': 'bus-97', '97E': 'bus-97e', '197': 'bus-197', '963': 'bus-963' };
  const BUSES            = ['97', '97E', '197', '963'];
  const AUTO_REFRESH_SEC = 30;
  const NAV_ACTIVE       = { home: 'active-home', jj: 'active-jj', san: 'active-san' };

  let activeTab      = 'home';
  let countdownSecs  = AUTO_REFRESH_SEC;
  let countdownTimer = null;
  let cachedServices = {};  // stopCode -> services array

  // ── 97E peak hours ───────────────────────────────────────
  function is97EActive() {
    const now    = new Date();
    const sgtMin = (now.getUTCHours() * 60 + now.getUTCMinutes() + 480) % 1440;
    const sgtDow = (now.getUTCDay() + (now.getUTCHours() + 8 >= 24 ? 1 : 0)) % 7;
    if (sgtDow < 1 || sgtDow > 5) return false;
    return (sgtMin >= 450 && sgtMin <= 510) || (sgtMin >= 1080 && sgtMin <= 1140);
  }

  function activeBuses() {
    return is97EActive() ? BUSES : BUSES.filter(b => b !== '97E');
  }

  // ── Arrival helpers ──────────────────────────────────────
  function arrivalLabel(isoStr) {
    if (!isoStr || isoStr === '0001-01-01T00:00:00+08:00') return null;
    const diff = Math.round((new Date(isoStr) - Date.now()) / 60000);
    if (diff <= 0) return { text: 'Arr', cls: 'active-blue' };
    if (diff <= 3) return { text: diff + 'm', cls: 'active-amber' };
    return { text: diff + 'm', cls: 'active-green' };
  }

  function loadBadge(l) {
    const m = { SEA: ['SEA','b-SEA'], SDA: ['SDA','b-SDA'], LSD: ['LSD','b-LSD'] };
    const [txt, cls] = m[l] || ['–','b-NA'];
    return `<span class="badge ${cls}">${txt}</span>`;
  }

  function typeBadge(t) {
    const m = { SD: ['SD','b-SD'], DD: ['DD','b-DD'], BD: ['BD','b-BD'] };
    const [txt, cls] = m[t] || ['–','b-NA'];
    return `<span class="badge ${cls}">${txt}</span>`;
  }

  // ── Render content for active tab ───────────────────────
  function renderContent(tabKey) {
    const stop = STOPS[tabKey];
    const services = cachedServices[stop.code] || [];
    const main = document.getElementById('mainContent');

    const busRows = activeBuses().map(busNo => {
      const svc = services.find(s => s.ServiceNo === busNo);
      const bc  = BUS_CLASS[busNo] || '';
      let chips = '';

      if (!svc) {
        chips = [1,2,3].map(() => `
          <div class="chip">
            <span class="chip-time">–</span>
            <div class="chip-badges">${loadBadge(null)}${typeBadge(null)}</div>
          </div>`).join('');
      } else {
        const ft = svc.NextBus?.Type || svc.NextBus2?.Type || '';
        chips = [svc.NextBus, svc.NextBus2, svc.NextBus3].map(b => {
          const lbl = arrivalLabel(b?.EstimatedArrival);
          const t   = b?.Type || ft;
          if (!lbl) return `
            <div class="chip">
              <span class="chip-time">–</span>
              <div class="chip-badges">${loadBadge(null)}${typeBadge(null)}</div>
            </div>`;
          return `
            <div class="chip">
              <span class="chip-time ${lbl.cls}">${lbl.text}</span>
              <div class="chip-badges">${loadBadge(b?.Load)}${typeBadge(t)}</div>
            </div>`;
        }).join('');
      }

      return `<div class="bus-row ${bc}">
        <div class="bus-num-col">
          <span class="bus-number">${busNo}</span>
        </div>
        <div class="arrivals">${chips}</div>
      </div>`;
    }).join('');

    main.innerHTML = `
      <div class="stop-heading">
        <span class="stop-icon">${stop.icon}</span>
        <div>
          <div class="stop-name">${stop.name}</div>
          <div class="stop-meta">
            <span class="stop-code">${stop.code}</span>
            <span class="stop-dist" id="content-dist-${tabKey}"></span>
          </div>
        </div>
      </div>
      <div class="bus-list">${busRows}</div>`;

    // Re-apply distance if already known
    const distEl = document.getElementById('content-dist-' + tabKey);
    const navDist = document.getElementById('dist-' + tabKey).textContent;
    if (distEl && navDist) { distEl.textContent = navDist; distEl.classList.add('visible'); }
  }

  function renderSkeletonContent(tabKey) {
    const stop = STOPS[tabKey];
    const main = document.getElementById('mainContent');
    const skelRow = () => `
      <div class="bus-row">
        <div class="bus-num-col"><div class="skel" style="width:36px;height:28px;border-radius:6px"></div></div>
        <div class="arrivals">
          ${[1,2,3].map(() => `
            <div class="chip">
              <div class="skel" style="width:70%;height:20px;margin-bottom:5px;border-radius:4px"></div>
              <div class="skel" style="width:90%;height:12px;border-radius:4px"></div>
            </div>`).join('')}
        </div>
      </div>`;
    main.innerHTML = `
      <div class="stop-heading">
        <span class="stop-icon">${stop.icon}</span>
        <div>
          <div class="stop-name">${stop.name}</div>
          <div class="stop-meta"><span class="stop-code">${stop.code}</span></div>
        </div>
      </div>
      <div class="bus-list">${activeBuses().map(skelRow).join('')}</div>`;
  }

  // ── Tab switching ────────────────────────────────────────
  function switchTab(tabKey) {
    activeTab = tabKey;
    document.querySelectorAll('.nav-btn').forEach(b =>
      b.classList.remove('active-home', 'active-jj', 'active-san'));
    document.getElementById('nav-' + tabKey).classList.add(NAV_ACTIVE[tabKey]);
    if (cachedServices[STOPS[tabKey].code]) {
      renderContent(tabKey);
    } else {
      renderSkeletonContent(tabKey);
    }
    document.getElementById('mainContent').scrollTop = 0;
  }

  // ── Fetch ────────────────────────────────────────────────
  async function fetchStop(key) {
    const res = await fetch('/api/bus?stop=' + STOPS[key].code);
    if (!res.ok) throw new Error(`HTTP ${res.status} for ${STOPS[key].code}`);
    return (await res.json()).Services || [];
  }

  async function fetchAll() {
    const btn = document.getElementById('refreshBtn');
    const err = document.getElementById('errMsg');
    btn.classList.add('loading');
    btn.textContent = '⟳ …';
    err.classList.remove('visible');
    renderSkeletonContent(activeTab);

    try {
      const keys = Object.keys(STOPS);
      const results = await Promise.all(keys.map(fetchStop));
      keys.forEach((k, i) => { cachedServices[STOPS[k].code] = results[i]; });
      renderContent(activeTab);
      document.getElementById('ts').textContent =
        new Date().toLocaleTimeString('en-SG',
          { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      resetCountdown();
    } catch (e) {
      err.textContent = '⚠ ' + e.message;
      err.classList.add('visible');
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = '⟳ REFRESH';
    }
  }

  // ── Countdown ────────────────────────────────────────────
  function resetCountdown() {
    clearInterval(countdownTimer);
    countdownSecs = AUTO_REFRESH_SEC;
    updateBar();
    countdownTimer = setInterval(() => {
      countdownSecs--;
      updateBar();
      if (countdownSecs <= 0) fetchAll();
    }, 1000);
  }

  function updateBar() {
    document.getElementById('cdFill').style.width =
      (countdownSecs / AUTO_REFRESH_SEC * 100) + '%';
  }

  // ── Panel ordering ───────────────────────────────────────
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000, r = d => d * Math.PI / 180;
    const dLat = r(lat2-lat1), dLon = r(lon2-lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  async function fetchStopCoord(key) {
    try {
      const res = await fetch('/api/stops?code=' + STOPS[key].ltaCode);
      if (!res.ok) return null;
      const d = await res.json();
      return { lat: d.Latitude, lng: d.Longitude };
    } catch { return null; }
  }

  function applyOrder(orderedKeys) {
    const nav = document.getElementById('bottomNav');
    orderedKeys.forEach(k => nav.appendChild(document.getElementById('nav-' + k)));
    switchTab(orderedKeys[0]);
  }

  function orderByTime() {
    const sgtHour = (new Date().getUTCHours() + 8) % 24;
    applyOrder(sgtHour < 14 ? ['home','jj','san'] : ['jj','san','home']);
  }

  async function initOrder() {
    if (!navigator.geolocation) { orderByTime(); return; }
    const keys   = Object.keys(STOPS);
    const coords = await Promise.all(keys.map(fetchStopCoord));
    const sc = {};
    keys.forEach((k, i) => { if (coords[i]) sc[k] = coords[i]; });
    if (Object.keys(sc).length < 3) { orderByTime(); return; }

    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: uLat, longitude: uLng } = pos.coords;
        const sorted = keys
          .map(k => ({ key: k, dist: haversine(uLat, uLng, sc[k].lat, sc[k].lng) }))
          .sort((a, b) => a.dist - b.dist);

        sorted.forEach(({ key, dist }) => {
          const m = Math.round(dist);
          const label = m < 1000 ? `${m}m` : `${(dist/1000).toFixed(1)}km`;
          document.getElementById('dist-' + key).textContent = label;
        });

        applyOrder(sorted.map(s => s.key));
        // Re-render active tab to show distance in content header
        renderContent(activeTab);
      },
      () => orderByTime()
    );
  }

  // ── Init ─────────────────────────────────────────────────
  switchTab('home');
  initOrder();
  fetchAll();
</script>
</body>
</html>
