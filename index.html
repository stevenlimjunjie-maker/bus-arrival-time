<!DOCTYPE html>
<html lang="en">
<head>
<!--
=============================================================
  SINGAPORE BUS ARRIVAL TRACKER
  Home: B20019  |  JJ Office: B18101  |  San Office: B18131
  Buses: 97, 97E, 197, 963
  Hosted on Vercel — LTA calls proxied via /api/bus
=============================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Tracker SG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:      #f0f4f8;
    --panel:   #ffffff;
    --border:  #dde3ea;
    --accent:  #0077cc;
    --accent2: #e05a00;
    --green:   #1a9e45;
    --yellow:  #b87200;
    --red:     #d62828;
    --text:    #1a2433;
    --muted:   #7a8fa6;
    --mono:    'Share Tech Mono', monospace;
    --head:    'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--head);
    min-height: 100vh;
    padding: 10px 10px 6px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    padding: 0 2px;
  }

  .header-left h1 {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
    color: var(--text);
  }

  .header-left h1 span { color: var(--accent); }

  .timestamp {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  .refresh-btn {
    font-family: var(--head);
    font-size: 13px; font-weight: 700;
    letter-spacing: 1px;
    color: #fff; background: var(--accent);
    border: none; border-radius: 8px;
    padding: 8px 16px; cursor: pointer;
    transition: all 0.2s;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,119,204,0.3);
    flex-shrink: 0;
  }

  .refresh-btn:active { transform: scale(0.96); }
  .refresh-btn.loading { background: var(--muted); pointer-events: none; box-shadow: none; }
  .refresh-btn.loading::after {
    content: '';
    position: absolute; left: 0; top: 0;
    height: 100%; width: 0%;
    background: rgba(255,255,255,0.2);
    animation: progress 1.5s ease-in-out infinite;
  }

  @keyframes progress {
    0%   { width: 0%; left: 0; }
    50%  { width: 60%; }
    100% { width: 0%; left: 100%; }
  }

  /* ── COUNTDOWN BAR ── */
  .countdown-bar {
    height: 2px; background: var(--border);
    border-radius: 1px; margin-bottom: 8px;
    overflow: hidden;
  }

  .countdown-fill {
    height: 100%; background: var(--accent);
    width: 100%; transition: width 1s linear; opacity: 0.5;
  }

  /* ── PANELS GRID — vertical stack ── */
  .panels {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 6px;
  }

  /* ── PANEL ── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
  }

  /* Coloured top accent bar */
  .panel-home   { border-top: 3px solid var(--accent); }
  .panel-office { border-top: 3px solid var(--accent2); }
  .panel-san    { border-top: 3px solid #1a8c3a; }

  .panel-header {
    padding: 6px 8px 5px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    background: #fafbfc;
  }

  .direction-icon {
    font-size: 14px; flex-shrink: 0; line-height: 1;
  }

  .panel-meta { min-width: 0; }

  .panel-title {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .panel-home   .panel-title { color: var(--accent); }
  .panel-office .panel-title { color: var(--accent2); }
  .panel-san    .panel-title { color: #1a8c3a; }

  .stop-code {
    font-family: var(--mono);
    font-size: 8px; color: var(--muted); letter-spacing: 0.5px;
  }

  .stop-dist {
    font-family: var(--mono);
    font-size: 8px; color: var(--accent);
    letter-spacing: 0.3px;
  }

  /* ── BUS LIST ── */
  .bus-list { padding: 3px 0; flex: 1; }

  .bus-row {
    display: flex;
    align-items: flex-start;
    padding: 5px 7px;
    border-bottom: 1px solid #f0f3f7;
    gap: 6px;
  }

  .bus-row:last-child { border-bottom: none; }

  /* Bus number — left column */
  .bus-number {
    font-size: 20px; font-weight: 900;
    width: 40px; flex-shrink: 0;
    letter-spacing: -0.5px;
    color: var(--text);
    padding-top: 2px;
    line-height: 1;
  }

  /* Arrival slots — right column, 3 chips always in a row */
  .arrivals {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    flex: 1;
  }

  /* Each chip: time on top, then load+type row below */
  .arrival-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f3f6fa;
    border-radius: 6px;
    padding: 5px 4px 4px;
  }

  .arrival-time {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    line-height: 1;
    color: var(--green);
  }

  .arrival-time.soon  { color: var(--yellow); }
  .arrival-time.now   { color: var(--accent); }
  .arrival-time.empty { color: var(--muted); font-size: 11px; font-weight: 400; }

  /* Row below time: load badge + type badge side by side */
  .chip-meta {
    display: flex;
    gap: 2px;
    margin-top: 3px;
    align-items: center;
  }

  .load-badge {
    font-size: 8px;
    font-family: var(--mono);
    font-weight: 800;
    padding: 1px 3px;
    border-radius: 3px;
    border-left: 2px solid transparent;
    white-space: nowrap;
  }

  .load-SEA { background: #b6f0cf; color: #0d6e2e; border-left-color: #1a9e45; }
  .load-SDA { background: #ffe08a; color: #7a4e00; border-left-color: #c47d00; }
  .load-LSD { background: #ffb3b3; color: #8b0000; border-left-color: #d62828; }
  .load-NA  { background: #e8ecf0; color: var(--muted); border-left-color: #ccc; }

  .type-badge {
    font-size: 8px;
    font-family: var(--mono);
    font-weight: 700;
    padding: 1px 3px;
    border-radius: 3px;
    white-space: nowrap;
  }

  .type-SD  { background: #e0edff; color: #0055aa; }
  .type-DD  { background: #ffe8cc; color: #a04000; }
  .type-BD  { background: #e2f5e2; color: #1a7a1a; }
  .type-NA  { background: #eee;    color: var(--muted); }

  /* ── SKELETON ── */
  .skeleton {
    border-radius: 4px;
    background: linear-gradient(90deg, #e8ecf0 25%, #f2f4f7 50%, #e8ecf0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── ERROR ── */
  .error-msg {
    font-family: var(--mono);
    font-size: 10px; color: var(--red);
    text-align: center;
    padding: 6px 12px;
    background: #ffeaea; border: 1px solid #ffcccc; border-radius: 6px;
    margin-bottom: 6px;
    display: none;
  }

  .error-msg.visible { display: block; }

  /* ── LEGEND ── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 4px 10px;
    justify-content: center;
    font-family: var(--mono); font-size: 9px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
  }

  .legend-item { display: flex; align-items: center; gap: 3px; }
  .l-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .l-dot.sea { background: var(--green); }
  .l-dot.sda { background: #c47d00; }
  .l-dot.lsd { background: var(--red); }
  .l-box { width: 14px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .l-box.sd { background: #e0edff; }
  .l-box.dd { background: #ffe8cc; }
  .l-box.bd { background: #e2f5e2; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>BUS <span>TRACKER</span></h1>
    <div class="timestamp" id="ts">—</div>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="fetchAll()">⟳ REFRESH</button>
</header>

<div class="countdown-bar"><div class="countdown-fill" id="cdFill"></div></div>
<div class="error-msg" id="errMsg"></div>

<div class="panels" id="panelsGrid">
  <!-- Home -->
  <div class="panel panel-home" id="panel-home">
    <div class="panel-header">
      <div class="direction-icon">🏠</div>
      <div class="panel-meta">
        <div class="panel-title">Home</div>
        <div class="stop-code">B20019</div>
      </div>
    </div>
    <div class="bus-list" id="list-B20019"></div>
  </div>

  <!-- JJ Office -->
  <div class="panel panel-office" id="panel-jj">
    <div class="panel-header">
      <div class="direction-icon">🏢</div>
      <div class="panel-meta">
        <div class="panel-title">JJ Office</div>
        <div class="stop-code">B18101</div>
      </div>
    </div>
    <div class="bus-list" id="list-B18101"></div>
  </div>

  <!-- San Office -->
  <div class="panel panel-san" id="panel-san">
    <div class="panel-header">
      <div class="direction-icon">🏗️</div>
      <div class="panel-meta">
        <div class="panel-title">San Office</div>
        <div class="stop-code">B18131</div>
      </div>
    </div>
    <div class="bus-list" id="list-B18131"></div>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="l-dot sea"></div>SEA Seats</div>
  <div class="legend-item"><div class="l-dot sda"></div>SDA Standing</div>
  <div class="legend-item"><div class="l-dot lsd"></div>LSD Limited</div>
  <div class="legend-item"><div class="l-box sd"></div>SD Single</div>
  <div class="legend-item"><div class="l-box dd"></div>DD Double</div>
  <div class="legend-item"><div class="l-box bd"></div>BD Bendy</div>
</div>

<script>
  const STOPS            = ['B20019', 'B18101', 'B18131'];
  const BUSES            = ['97', '97E', '197', '963'];
  const AUTO_REFRESH_SEC = 30;

  let countdownSecs  = AUTO_REFRESH_SEC;
  let countdownTimer = null;

  // 97E: Mon–Fri only, 07:30–08:30 and 18:00–19:00 SGT
  function is97EActive() {
    const now = new Date();
    const sgtMin = (now.getUTCHours() * 60 + now.getUTCMinutes() + 8 * 60) % (24 * 60);
    const sgtDow = (now.getUTCDay() + (now.getUTCHours() + 8 >= 24 ? 1 : 0)) % 7;
    if (sgtDow < 1 || sgtDow > 5) return false;
    return (sgtMin >= 450 && sgtMin <= 510) || (sgtMin >= 1080 && sgtMin <= 1140);
  }

  function activeBuses() {
    return is97EActive() ? BUSES : BUSES.filter(b => b !== '97E');
  }

  function arrivalLabel(isoStr) {
    if (!isoStr || isoStr === '0001-01-01T00:00:00+08:00') return null;
    const diff = Math.round((new Date(isoStr) - Date.now()) / 60000);
    if (diff <= 0) return { text: 'Arr', cls: 'now' };
    if (diff <= 3) return { text: diff + 'm', cls: 'soon' };
    return { text: diff + 'm', cls: '' };
  }

  function loadClass(l) { return { SEA:'SEA', SDA:'SDA', LSD:'LSD' }[l] || 'NA'; }
  function loadLabel(l) { return { SEA:'SEA', SDA:'SDA', LSD:'LSD' }[l] || '–'; }
  function typeClass(t) { return { SD:'SD', DD:'DD', BD:'BD' }[t] || 'NA'; }
  function typeLabel(t) { return { SD:'SD', DD:'DD', BD:'BD' }[t] || '–'; }

  function renderSkeleton(stopCode) {
    const el = document.getElementById('list-' + stopCode);
    el.innerHTML = activeBuses().map(() => `
      <div class="bus-row">
        <div class="bus-number"><div class="skeleton" style="width:28px;height:18px"></div></div>
        <div class="arrivals">
          ${[1,2,3].map(() => `<div class="arrival-chip"><div class="skeleton" style="width:100%;height:14px;margin-bottom:3px"></div><div class="skeleton" style="width:100%;height:10px"></div></div>`).join('')}
        </div>
      </div>`).join('');
  }

  function renderStop(stopCode, services) {
    const el = document.getElementById('list-' + stopCode);
    if (!el) return;
    el.innerHTML = activeBuses().map(busNo => {
      const svc = services.find(s => s.ServiceNo === busNo);
      let chips = '';

      if (!svc) {
        chips = `<div class="arrival-chip">
          <span class="arrival-time empty">–</span>
          <div class="chip-meta"><span class="load-badge load-NA">–</span><span class="type-badge type-NA">–</span></div>
        </div>`;
      } else {
        const t = svc.NextBus?.Type || svc.NextBus2?.Type || '';
        chips = [svc.NextBus, svc.NextBus2, svc.NextBus3].map(b => {
          const lbl = arrivalLabel(b?.EstimatedArrival);
          if (!lbl) return `<div class="arrival-chip">
            <span class="arrival-time empty">–</span>
            <div class="chip-meta"><span class="load-badge load-NA">–</span><span class="type-badge type-NA">–</span></div>
          </div>`;
          return `<div class="arrival-chip">
            <span class="arrival-time ${lbl.cls}">${lbl.text}</span>
            <div class="chip-meta">
              <span class="load-badge load-${loadClass(b?.Load)}">${loadLabel(b?.Load)}</span>
              <span class="type-badge type-${typeClass(b?.Type || t)}">${typeLabel(b?.Type || t)}</span>
            </div>
          </div>`;
        }).join('');
      }

      return `<div class="bus-row">
        <div class="bus-number">${busNo}</div>
        <div class="arrivals">${chips}</div>
      </div>`;
    }).join('');
  }

  async function fetchStop(stopCode) {
    const res = await fetch('/api/bus?stop=' + stopCode);
    if (!res.ok) throw new Error(`HTTP ${res.status} for ${stopCode}`);
    return (await res.json()).Services || [];
  }

  async function fetchAll() {
    const btn = document.getElementById('refreshBtn');
    const err = document.getElementById('errMsg');
    btn.classList.add('loading');
    btn.textContent = '⟳ …';
    err.classList.remove('visible');
    STOPS.forEach(renderSkeleton);
    try {
      const [s1, s2, s3] = await Promise.all(STOPS.map(fetchStop));
      renderStop(STOPS[0], s1);
      renderStop(STOPS[1], s2);
      renderStop(STOPS[2], s3);
      document.getElementById('ts').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      resetCountdown();
    } catch (e) {
      err.textContent = '⚠ ' + e.message;
      err.classList.add('visible');
      STOPS.forEach(s => {
        const el = document.getElementById('list-' + s);
        if (el) el.innerHTML = activeBuses().map(b =>
          `<div class="bus-row"><div class="bus-number">${b}</div><div class="arrivals"><div class="arrival-chip"><span class="arrival-time empty">Err</span></div></div></div>`
        ).join('');
      });
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = '⟳ REFRESH';
    }
  }

  function resetCountdown() {
    clearInterval(countdownTimer);
    countdownSecs = AUTO_REFRESH_SEC;
    updateBar();
    countdownTimer = setInterval(() => {
      countdownSecs--;
      updateBar();
      if (countdownSecs <= 0) fetchAll();
    }, 1000);
  }

  function updateBar() {
    document.getElementById('cdFill').style.width = (countdownSecs / AUTO_REFRESH_SEC * 100) + '%';
  }

  // ── Panel ordering ────────────────────────────────────────
  const STOP_CODES = { 'B20019': '20019', 'B18101': '18101', 'B18131': '18131' };
  const PANEL_IDS  = { 'B20019': 'panel-home', 'B18101': 'panel-jj', 'B18131': 'panel-san' };

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000, r = d => d * Math.PI / 180;
    const dLat = r(lat2-lat1), dLon = r(lon2-lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(r(lat1)) * Math.cos(r(lat2)) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  async function fetchStopCoord(key) {
    const res = await fetch('/api/stops?code=' + STOP_CODES[key]);
    if (!res.ok) return null;
    const d = await res.json();
    return { lat: d.Latitude, lng: d.Longitude };
  }

  function orderPanelsByDistance(userLat, userLng, stopCoords) {
    const grid = document.getElementById('panelsGrid');
    Object.keys(stopCoords)
      .map(key => ({ key, dist: haversine(userLat, userLng, stopCoords[key].lat, stopCoords[key].lng) }))
      .sort((a, b) => a.dist - b.dist)
      .forEach(({ key, dist }) => {
        const panel = document.getElementById(PANEL_IDS[key]);
        if (!panel) return;
        let distEl = panel.querySelector('.stop-dist');
        if (!distEl) {
          distEl = document.createElement('div');
          distEl.className = 'stop-dist';
          panel.querySelector('.panel-meta').appendChild(distEl);
        }
        const m = Math.round(dist);
        distEl.textContent = m < 1000 ? `${m}m` : `${(dist/1000).toFixed(1)}km`;
        grid.appendChild(panel);
      });
  }

  function orderPanelsByTime() {
    const sgtHour = (new Date().getUTCHours() + 8) % 24;
    const grid = document.getElementById('panelsGrid');
    const home = document.getElementById('panel-home');
    const jj   = document.getElementById('panel-jj');
    const san  = document.getElementById('panel-san');
    if (sgtHour < 14) {
      grid.appendChild(home); grid.appendChild(jj); grid.appendChild(san);
    } else {
      grid.appendChild(jj); grid.appendChild(san); grid.appendChild(home);
    }
  }

  async function initPanelOrder() {
    if (!navigator.geolocation) { orderPanelsByTime(); return; }
    const keys = Object.keys(STOP_CODES);
    const coords = await Promise.all(keys.map(fetchStopCoord));
    const stopCoords = {};
    keys.forEach((k, i) => { if (coords[i]) stopCoords[k] = coords[i]; });
    if (Object.keys(stopCoords).length < 3) { orderPanelsByTime(); return; }
    navigator.geolocation.getCurrentPosition(
      pos => orderPanelsByDistance(pos.coords.latitude, pos.coords.longitude, stopCoords),
      ()  => orderPanelsByTime()
    );
  }

  initPanelOrder();
  fetchAll();
</script>
</body>
</html>
