<!DOCTYPE html>
<html lang="en">
<head>
<!--
=============================================================
  SINGAPORE BUS ARRIVAL TRACKER
  Home: B20019  |  JJ Office: B18101  |  San Office: B18131
  Buses: 97, 97E, 197, 963
  Hosted on Vercel — LTA calls proxied via /api/bus
=============================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bus Tracker SG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:      #f0f4f8;
    --panel:   #ffffff;
    --border:  #dde3ea;
    --accent:  #0077cc;
    --accent2: #e05a00;
    --green:   #1a9e45;
    --yellow:  #c47d00;
    --red:     #d62828;
    --text:    #1a2433;
    --muted:   #7a8fa6;
    --mono:    'Share Tech Mono', monospace;
    --head:    'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--head);
    min-height: 100vh;
    padding: 16px;
    background-image:
      radial-gradient(ellipse at 20% 0%,   #0077cc0d 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, #e05a000d 0%, transparent 60%);
  }

  /* ── HEADER ── */
  header { text-align: center; margin-bottom: 20px; }

  .logo {
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--accent);
    font-family: var(--mono);
    text-transform: uppercase;
    margin-bottom: 4px;
    opacity: 0.8;
  }

  h1 {
    font-size: clamp(28px, 7vw, 48px);
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .timestamp {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  /* ── LAYOUT ── */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    max-width: 1050px;
    margin: 0 auto 20px;
  }

  @media (max-width: 700px) {
    .panels { grid-template-columns: 1fr; }
  }

  /* ── PANEL ── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: box-shadow 0.3s;
  }

  .panel:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

  .panel-header {
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-home   .panel-header { background: #e8f4ff; }
  .panel-office .panel-header { background: #fff3eb; }
  .panel-san    .panel-header { background: #f0fff4; }

  .direction-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }

  .panel-home   .direction-icon { background: #cce6ff; }
  .panel-office .direction-icon { background: #ffd9b8; }
  .panel-san    .direction-icon { background: #bbf0cc; }

  .panel-title {
    font-size: 13px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
  }

  .panel-home   .panel-title { color: var(--accent); }
  .panel-office .panel-title { color: var(--accent2); }
  .panel-san    .panel-title { color: #1a8c3a; }

  .stop-code {
    font-family: var(--mono);
    font-size: 10px; color: var(--muted); letter-spacing: 1px;
  }

  /* ── COLUMN HEADERS ── */
  .col-headers {
    display: flex;
    align-items: center;
    padding: 4px 16px;
    background: #f7f9fc;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }

  .ch-bus  { width: 52px; flex-shrink: 0; }
  .ch-type { width: 36px; text-align: center; flex-shrink: 0; }
  .ch-arr  { flex: 1; }

  .col-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── BUS ROWS ── */
  .bus-list { padding: 4px 0; }

  .bus-row {
    display: flex; align-items: center;
    padding: 8px 16px;
    border-bottom: 1px solid #f0f3f7;
    gap: 10px;
    transition: background 0.2s;
  }

  .bus-row:last-child { border-bottom: none; }
  .bus-row:hover { background: #f5f8ff; }

  .bus-number {
    font-size: 22px; font-weight: 900;
    width: 52px; flex-shrink: 0;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .arrivals { display: flex; gap: 6px; flex: 1; flex-wrap: wrap; }

  .arrival-chip {
    display: flex; flex-direction: column;
    align-items: center; min-width: 44px;
    background: #f0f4f8;
    border-radius: 6px;
    padding: 4px 5px;
  }

  .arrival-time {
    font-family: var(--mono);
    font-size: 14px; line-height: 1;
    color: var(--green);
    font-weight: 600;
  }

  .arrival-time.soon  { color: var(--yellow); }
  .arrival-time.now   { color: var(--accent); font-weight: 700; }
  .arrival-time.empty { color: var(--muted); font-size: 12px; }

  /* ── LOAD BADGE ── */
  .load-badge {
    font-size: 9px;
    font-family: var(--mono);
    letter-spacing: 0.5px;
    margin-top: 3px;
    padding: 2px 5px;
    border-radius: 4px;
    font-weight: 800;
    border-left: 3px solid transparent;
  }

  .load-SEA { background: #b6f0cf; color: #0d6e2e; border-left-color: #1a9e45; }
  .load-SDA { background: #ffe08a; color: #7a4e00; border-left-color: #c47d00; }
  .load-LSD { background: #ffb3b3; color: #8b0000; border-left-color: #d62828; }
  .load-NA  { background: #e8ecf0; color: var(--muted); border-left-color: #ccc; }

  /* ── BUS TYPE BADGE ── */
  .bus-type {
    width: 36px; flex-shrink: 0;
    display: flex; justify-content: center;
  }

  .type-badge {
    font-size: 9px;
    font-family: var(--mono);
    font-weight: 700;
    letter-spacing: 0.3px;
    padding: 3px 5px;
    border-radius: 4px;
    text-align: center;
    white-space: nowrap;
  }

  .type-SD  { background: #e0edff; color: #0055aa; }
  .type-DD  { background: #ffe8cc; color: #a04000; }
  .type-BD  { background: #e2f5e2; color: #1a7a1a; }
  .type-NA  { background: #eee;    color: var(--muted); }

  /* ── SKELETON ── */
  .skeleton {
    border-radius: 4px;
    background: linear-gradient(90deg, #e8ecf0 25%, #f2f4f7 50%, #e8ecf0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── LEGEND ── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 6px 14px;
    justify-content: center;
    max-width: 1050px; margin: 16px auto 0;
    font-family: var(--mono); font-size: 10px;
    color: var(--muted);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }

  .legend-item { display: flex; align-items: center; gap: 4px; }
  .l-dot { width: 8px; height: 8px; border-radius: 50%; }
  .l-dot.sea { background: var(--green); }
  .l-dot.sda { background: var(--yellow); }
  .l-dot.lsd { background: var(--red); }
  .l-box { width: 18px; height: 12px; border-radius: 3px; }
  .l-box.sd { background: #e0edff; }
  .l-box.dd { background: #ffe8cc; }
  .l-box.bd { background: #e2f5e2; }

  /* ── CONTROLS ── */
  .controls { text-align: center; max-width: 1050px; margin: 0 auto; }

  .refresh-btn {
    font-family: var(--head);
    font-size: 15px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: #fff; background: var(--accent);
    border: none; border-radius: 8px;
    padding: 12px 36px; cursor: pointer;
    transition: all 0.2s;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,119,204,0.25);
  }

  .refresh-btn:hover  { background: #005fa8; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,119,204,0.35); }
  .refresh-btn:active { transform: translateY(0); }

  .refresh-btn.loading { background: var(--muted); pointer-events: none; box-shadow: none; }

  .refresh-btn.loading::after {
    content: '';
    position: absolute; left: 0; top: 0;
    height: 100%; width: 0%;
    background: rgba(255,255,255,0.2);
    animation: progress 1.5s ease-in-out infinite;
  }

  @keyframes progress {
    0%   { width: 0%; left: 0; }
    50%  { width: 60%; }
    100% { width: 0%; left: 100%; }
  }

  .auto-label {
    font-family: var(--mono);
    font-size: 10px; color: var(--muted);
    margin-top: 8px; letter-spacing: 1px;
  }

  /* ── COUNTDOWN BAR ── */
  .countdown-bar {
    height: 3px; background: var(--border);
    border-radius: 2px;
    max-width: 1050px; margin: 12px auto 0;
    overflow: hidden;
  }

  .countdown-fill {
    height: 100%; background: var(--accent);
    width: 100%; transition: width 1s linear; opacity: 0.5;
  }

  /* ── ERROR ── */
  .error-msg {
    font-family: var(--mono);
    font-size: 11px; color: var(--red);
    text-align: center; margin-top: 10px;
    padding: 8px 16px;
    background: #ffeaea; border: 1px solid #ffcccc; border-radius: 6px;
    max-width: 1050px; margin-left: auto; margin-right: auto;
    display: none;
  }

  .error-msg.visible { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">Singapore Transit</div>
  <h1>BUS <span>TRACKER</span></h1>
  <div class="timestamp" id="ts">—</div>
</header>

<div class="panels" id="panelsGrid">
  <!-- Home -->
  <div class="panel panel-home" id="panel-home">
    <div class="panel-header">
      <div class="direction-icon">🏠</div>
      <div>
        <div class="panel-title">Home</div>
        <div class="stop-code">STOP B20019</div>
      </div>
    </div>
    <div class="col-headers">
      <div class="ch-bus col-label">Bus</div>
      <div class="ch-type col-label">Type</div>
      <div class="ch-arr col-label">Arrivals &amp; Load</div>
    </div>
    <div class="bus-list" id="list-B20019"></div>
  </div>

  <!-- JJ Office -->
  <div class="panel panel-office" id="panel-jj">
    <div class="panel-header">
      <div class="direction-icon">🏢</div>
      <div>
        <div class="panel-title">JJ Office</div>
        <div class="stop-code">STOP B18101</div>
      </div>
    </div>
    <div class="col-headers">
      <div class="ch-bus col-label">Bus</div>
      <div class="ch-type col-label">Type</div>
      <div class="ch-arr col-label">Arrivals &amp; Load</div>
    </div>
    <div class="bus-list" id="list-B18101"></div>
  </div>

  <!-- San Office -->
  <div class="panel panel-san" id="panel-san">
    <div class="panel-header">
      <div class="direction-icon">🏗️</div>
      <div>
        <div class="panel-title">San Office</div>
        <div class="stop-code">STOP B18131</div>
      </div>
    </div>
    <div class="col-headers">
      <div class="ch-bus col-label">Bus</div>
      <div class="ch-type col-label">Type</div>
      <div class="ch-arr col-label">Arrivals &amp; Load</div>
    </div>
    <div class="bus-list" id="list-B18131"></div>
  </div>
</div>

<div class="controls">
  <button class="refresh-btn" id="refreshBtn" onclick="fetchAll()">⟳ &nbsp;REFRESH</button>
  <div class="auto-label">AUTO-REFRESH EVERY 30 SEC</div>
</div>
<div class="countdown-bar"><div class="countdown-fill" id="cdFill"></div></div>
<div class="error-msg" id="errMsg"></div>

<!-- Legend at bottom -->
<div class="legend">
  <div class="legend-item"><div class="l-dot sea"></div>Seats Avail (SEA)</div>
  <div class="legend-item"><div class="l-dot sda"></div>Standing (SDA)</div>
  <div class="legend-item"><div class="l-dot lsd"></div>Limited (LSD)</div>
  <div class="legend-item"><div class="l-box sd"></div>SD Single Deck</div>
  <div class="legend-item"><div class="l-box dd"></div>DD Double Deck</div>
  <div class="legend-item"><div class="l-box bd"></div>BD Bendy</div>
</div>

<script>
  const STOPS            = ['B20019', 'B18101', 'B18131'];
  const BUSES            = ['97', '97E', '197', '963'];
  const AUTO_REFRESH_SEC = 30;

  let countdownSecs  = AUTO_REFRESH_SEC;
  let countdownTimer = null;

  function arrivalLabel(isoStr) {
    if (!isoStr || isoStr === '0001-01-01T00:00:00+08:00') return null;
    const diff = Math.round((new Date(isoStr) - Date.now()) / 60000);
    if (diff <= 0) return { text: 'Arr', cls: 'now' };
    if (diff <= 3) return { text: diff + 'm', cls: 'soon' };
    return { text: diff + 'm', cls: '' };
  }

  function loadClass(load) { return { SEA:'SEA', SDA:'SDA', LSD:'LSD' }[load] || 'NA'; }
  function loadLabel(load) { return { SEA:'SEA', SDA:'SDA', LSD:'LSD' }[load] || '–'; }
  function typeClass(type) { return { SD:'SD', DD:'DD', BD:'BD' }[type] || 'NA'; }
  function typeLabel(type) { return { SD:'SD', DD:'DD', BD:'BD' }[type] || '–'; }

  function renderSkeleton(stopCode) {
    const el = document.getElementById('list-' + stopCode);
    el.innerHTML = BUSES.map(() => `
      <div class="bus-row">
        <div class="bus-number"><div class="skeleton" style="width:40px;height:22px"></div></div>
        <div class="bus-type"><div class="skeleton" style="width:28px;height:18px;border-radius:4px"></div></div>
        <div class="arrivals" style="gap:6px">
          <div class="skeleton" style="width:46px;height:38px;border-radius:6px"></div>
          <div class="skeleton" style="width:46px;height:38px;border-radius:6px"></div>
          <div class="skeleton" style="width:46px;height:38px;border-radius:6px"></div>
        </div>
      </div>`).join('');
  }

  function renderStop(stopCode, services) {
    const el = document.getElementById('list-' + stopCode);
    if (!el) return;
    el.innerHTML = BUSES.map(busNo => {
      const svc = services.find(s => s.ServiceNo === busNo);
      let chips = '';
      let typeHtml = '<div class="type-badge type-NA">–</div>';

      if (!svc) {
        chips = `<div class="arrival-chip"><span class="arrival-time empty">–</span><span class="load-badge load-NA">–</span></div>`;
      } else {
        chips = [svc.NextBus, svc.NextBus2, svc.NextBus3].map(b => {
          const lbl = arrivalLabel(b?.EstimatedArrival);
          if (!lbl) return `<div class="arrival-chip"><span class="arrival-time empty">–</span><span class="load-badge load-NA">–</span></div>`;
          return `<div class="arrival-chip">
            <span class="arrival-time ${lbl.cls}">${lbl.text}</span>
            <span class="load-badge load-${loadClass(b?.Load)}">${loadLabel(b?.Load)}</span>
          </div>`;
        }).join('');
        const t = svc.NextBus?.Type || svc.NextBus2?.Type || '';
        typeHtml = `<div class="type-badge type-${typeClass(t)}">${typeLabel(t)}</div>`;
      }

      return `<div class="bus-row">
        <div class="bus-number">${busNo}</div>
        <div class="bus-type">${typeHtml}</div>
        <div class="arrivals">${chips}</div>
      </div>`;
    }).join('');
  }

  async function fetchStop(stopCode) {
    const res = await fetch('/api/bus?stop=' + stopCode);
    if (!res.ok) throw new Error(`HTTP ${res.status} for stop ${stopCode}`);
    return (await res.json()).Services || [];
  }

  async function fetchAll() {
    const btn = document.getElementById('refreshBtn');
    const err = document.getElementById('errMsg');
    btn.classList.add('loading');
    btn.textContent = '⟳  LOADING…';
    err.classList.remove('visible');
    STOPS.forEach(renderSkeleton);
    try {
      const [s1, s2, s3] = await Promise.all(STOPS.map(fetchStop));
      renderStop(STOPS[0], s1);
      renderStop(STOPS[1], s2);
      renderStop(STOPS[2], s3);
      document.getElementById('ts').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-SG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      resetCountdown();
    } catch (e) {
      err.textContent = '⚠ ' + e.message;
      err.classList.add('visible');
      STOPS.forEach(s => {
        const el = document.getElementById('list-' + s);
        if (el) el.innerHTML = BUSES.map(b =>
          `<div class="bus-row"><div class="bus-number">${b}</div><div class="bus-type"></div><div class="arrivals"><span class="arrival-time empty">Error</span></div></div>`
        ).join('');
      });
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = '⟳ &nbsp;REFRESH';
    }
  }

  function resetCountdown() {
    clearInterval(countdownTimer);
    countdownSecs = AUTO_REFRESH_SEC;
    updateBar();
    countdownTimer = setInterval(() => {
      countdownSecs--;
      updateBar();
      if (countdownSecs <= 0) fetchAll();
    }, 1000);
  }

  function updateBar() {
    document.getElementById('cdFill').style.width =
      (countdownSecs / AUTO_REFRESH_SEC * 100) + '%';
  }

  // ── Panel ordering based on time (SGT = UTC+8) ──────────
  // Before 14:00 → Home, JJ Office, San Office
  // From  14:00 → JJ Office, San Office, Home
  function orderPanels() {
    const now = new Date();
    const sgtHour = (now.getUTCHours() + 8) % 24;
    const grid = document.getElementById('panelsGrid');
    const home = document.getElementById('panel-home');
    const jj   = document.getElementById('panel-jj');
    const san  = document.getElementById('panel-san');

    if (sgtHour < 14) {
      // Before 2pm: Home, JJ, San
      grid.appendChild(home);
      grid.appendChild(jj);
      grid.appendChild(san);
    } else {
      // From 2pm: JJ, San, Home
      grid.appendChild(jj);
      grid.appendChild(san);
      grid.appendChild(home);
    }
  }

  orderPanels();
  fetchAll();
</script>
</body>
</html>
